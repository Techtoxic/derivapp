[build]
  command = "npm run bootstrap && NODE_OPTIONS='--max-old-space-size=8192' nx build @deriv/components --skip-nx-cache && npm run build:local && mkdir -p dist && cp dtrader-index.html dist/index.html && cp -r packages/trader/dist/trader/js dist/ && if [ -d packages/trader/dist/trader/css ]; then cp -r packages/trader/dist/trader/css dist/; fi"
  publish = "dist"
  environment = { NODE_VERSION = "20" }

[[redirects]]
  from = "/js/*"
  to = "/js/:splat"
  status = 200

[[redirects]]
  from = "/css/*"
  to = "/css/:splat"
  status = 200

[[redirects]]
  from = "/media/*"
  to = "/media/:splat"
  status = 200

[[redirects]]
  from = "/dtrader"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/dtrader/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/"
  to = "/dtrader"
  status = 302

[[redirects]]
  from = "/*"
  to = "/dtrader"
  status = 302

[functions]
  node_bundler = "esbuild"
  
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
