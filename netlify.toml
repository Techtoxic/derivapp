[build]
  command = "npm run bootstrap && NODE_OPTIONS='--max-old-space-size=16384' nx run-many --target=build --projects=@deriv/shared,@deriv/components,@deriv/translations,@deriv/hooks,@deriv/stores,@deriv/utils,@deriv/account,@deriv/cashier,@deriv/cfd,@deriv/reports,@deriv/bot-web-ui,@deriv/appstore,@deriv/wallets,@deriv/trader --parallel=1 && cd packages/core && npm run build"
  publish = "packages/core/dist"
  environment = { NODE_VERSION = "20" }

[[redirects]]
  from = "/"
  to = "/dtrader"
  status = 301

[[redirects]]
  from = "/*"
  to = "/dtrader"
  status = 301

[functions]
  node_bundler = "esbuild"
  
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
