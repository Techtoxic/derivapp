[build]
  command = "npm run bootstrap && NODE_OPTIONS='--max-old-space-size=4096' npm run build:all"
  publish = "packages/core/dist"
  environment = { NODE_VERSION = "20" }

[[redirects]]
  from = "/"
  to = "/dtrader"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Security-Policy = "frame-ancestors *"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
