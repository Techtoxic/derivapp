[build]
  # Build required workspaces then Trader; disable husky during CI
  command = "HUSKY=0 NODE_OPTIONS='--max-old-space-size=4096' npm ci --strict-peer-deps && npm --workspace=@deriv/shared run build && npm --workspace=@deriv/components run build && npm --workspace=@deriv/trader run build"
  # Serve the Trader dist output so /trader assets and headers apply
  publish = "packages/trader/dist"
  environment = { NODE_VERSION = "20", HUSKY = "0" }

[[redirects]]
  from = "/"
  to = "/dtrader"
  status = 302

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors *"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
