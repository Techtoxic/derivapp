[build]
  command = "npm run bootstrap && NODE_OPTIONS='--max-old-space-size=8192' npm run build:local && mkdir -p dist && cp packages/trader/dist/trader/index.html dist/ && cp -r packages/trader/dist/trader/js dist/ && cp -r packages/trader/dist/trader/css dist/"
  publish = "dist"
  environment = { NODE_VERSION = "20" }

[[redirects]]
  from = "/"
  to = "/dtrader"
  status = 301

[[redirects]]
  from = "/*"
  to = "/dtrader"
  status = 301

[functions]
  node_bundler = "esbuild"
  
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
