<!DOCTYPE html>
<html>
    <head>
        <title>Deriv</title>
        <meta charset="utf-8" />
        <meta name="referrer" content="origin" />
        <script>
            window.addEventListener('message', function (message) {
                let domain_url = '';
                if (window.location.hostname.indexOf('deriv.me') > -1) {
                    domain_url = 'deriv.me';
                } else if (window.location.hostname.indexOf('deriv.be') > -1) {
                    domain_url = 'deriv.be';
                } else {
                    domain_url = 'deriv.com';
                }
                var allowed_origins = [
                    `https://smarttrader.${domain_url}`,
                    `https://staging-smarttrader.${domain_url}`,
                    `https://app.${domain_url}`,
                    `https://staging-app.${domain_url}`,
                    `https://dbot.${domain_url}`,
                    `https://staging-dbot.${domain_url}`,
                    `https://dbotke.netlify.app`,
                    `https://bot.${domain_url}`,
                    `https://staging-bot.deriv.com`,
                    `https://p2p.${domain_url}`,
                    `https://staging-p2p.${domain_url}`,
                    `https://staging-hub.${domain_url}`,
                    `https://dev-hub.${domain_url}`,
                    `https://hub.${domain_url}`,
                ];
                let referrer_origin = '';
                if (document.referrer) {
                    try {
                        referrer_origin = new URL(document.referrer).origin;
                    } catch (e) {
                        referrer_origin = '';
                    }
                }

                const is_localhost_origin = /^https?:\/\/(localhost|127\.0\.0\.1)(:\d+)?$/i.test(message.origin);
                const is_netlify_host = window.location.hostname.endsWith('.netlify.app');
                const is_netlify_origin = /^https:\/\/[a-z0-9-]+\.netlify\.app$/i.test(message.origin);
                const is_allowed_origin =
                    allowed_origins.includes(message.origin) ||
                    message.origin === referrer_origin ||
                    is_localhost_origin ||
                    (is_netlify_host && is_netlify_origin);

                if (is_allowed_origin) {
                    const key_alias_map = {
                        clientAccounts: 'client.accounts',
                    };
                    const normalized_key = key_alias_map[message.data.key] || message.data.key;
                    switch (normalized_key) {
                        case 'active_loginid':
                        case 'client.accounts': {
                            if (!message.data.value) {
                                localStorage.removeItem(normalized_key);
                                if (normalized_key === 'active_loginid') {
                                    sessionStorage.removeItem(normalized_key);
                                }
                            } else if (localStorage.getItem(normalized_key) !== message.data.value) {
                                localStorage.setItem(normalized_key, message.data.value);
                                if (normalized_key === 'active_loginid') {
                                    sessionStorage.setItem(normalized_key, message.data.value);
                                }
                            }

                            window.parent?.postMessage(
                                {
                                    key: 'localstorage-sync-ready',
                                    value: JSON.stringify({
                                        clientAccounts: localStorage.getItem('client.accounts') || '',
                                        activeLoginid: localStorage.getItem('active_loginid') || '',
                                        activeWalletLoginid: localStorage.getItem('active_wallet_loginid') || '',
                                        authToken: localStorage.getItem('authToken') || '',
                                        accountsList: localStorage.getItem('accountsList') || '',
                                    }),
                                },
                                message.origin
                            );
                            break;
                        }
                        case 'active_wallet_loginid':
                        case 'authToken':
                        case 'accountsList': {
                            if (!message.data.value) {
                                localStorage.removeItem(normalized_key);
                                if (normalized_key === 'active_wallet_loginid') {
                                    sessionStorage.removeItem(normalized_key);
                                }
                            } else if (localStorage.getItem(normalized_key) !== message.data.value) {
                                localStorage.setItem(normalized_key, message.data.value);
                                if (normalized_key === 'active_wallet_loginid') {
                                    sessionStorage.setItem(normalized_key, message.data.value);
                                }
                            }

                            window.parent?.postMessage(
                                {
                                    key: 'localstorage-sync-ready',
                                    value: JSON.stringify({
                                        clientAccounts: localStorage.getItem('client.accounts') || '',
                                        activeLoginid: localStorage.getItem('active_loginid') || '',
                                        activeWalletLoginid: localStorage.getItem('active_wallet_loginid') || '',
                                        authToken: localStorage.getItem('authToken') || '',
                                        accountsList: localStorage.getItem('accountsList') || '',
                                    }),
                                },
                                message.origin
                            );
                            break;
                        }
                    }
                }
            });
        </script>
    </head>

    <body></body>
</html>
