<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DTrader</title>
    <style>
        html, body, #root {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        body {
            font-family: Arial, sans-serif;
            background: #0e1726;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-router-dom@5/umd/react-router-dom.js"></script>
    <script src="https://unpkg.com/mobx@6/dist/mobx.umd.production.min.js"></script>
    <script src="https://unpkg.com/mobx-react-lite@3/dist/mobx-react-lite.umd.production.min.js"></script>

    <script src="/js/trader.js"></script>
    <script>
        (function init() {
            var root = document.getElementById('root');
            var traderLib = window['@deriv/trader'];
            if (!traderLib || !traderLib.default) {
                root.innerHTML = '<div style="padding:24px">Failed to load DTrader bundle.</div>';
                return;
            }

            try {
                ReactDOM.render(React.createElement(traderLib.default), root);
            } catch (e) {
                root.innerHTML = '<div style="padding:24px">DTrader runtime error.</div>';
                console.error(e);
            }
        })();
    </script>
</body>
</html>
